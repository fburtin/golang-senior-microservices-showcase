definitions:
  bcra.DebtEntity:
    properties:
      diasAtrasoPago:
        example: 0
        type: integer
      enRevision:
        example: false
        type: boolean
      entidad:
        example: BANCO DE GALICIA Y BUENOS AIRES S.A.
        type: string
      fechaSit1:
        example: "2006-09-30"
        type: string
      irrecDisposicionTecnica:
        example: false
        type: boolean
      monto:
        example: 1847
        type: number
      procesoJud:
        example: false
        type: boolean
      recategorizacionOblig:
        example: false
        type: boolean
      refinanciaciones:
        example: false
        type: boolean
      situacion:
        example: 1
        type: integer
      situacionJuridica:
        example: false
        type: boolean
    type: object
  bcra.DebtPeriod:
    properties:
      entidades:
        items:
          $ref: '#/definitions/bcra.DebtEntity'
        type: array
      periodo:
        example: "202605"
        type: string
    type: object
  bcra.DebtResponse:
    properties:
      results:
        $ref: '#/definitions/bcra.DebtResult'
      status:
        example: 200
        type: integer
    type: object
  bcra.DebtResult:
    properties:
      denominacion:
        example: PERSONA EJEMPLO
        type: string
      identificacion:
        example: 20292456078
        type: integer
      periodos:
        items:
          $ref: '#/definitions/bcra.DebtPeriod'
        type: array
    type: object
  bcra.ErrorResponse:
    properties:
      errorMessages:
        example:
        - No se encontró datos para la identificación ingresada.
        items:
          type: string
        type: array
      status:
        example: 404
        type: integer
    type: object
  domain.Customer:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      lastName:
        type: string
    type: object
  handlers.CreateCustomerRequest:
    properties:
      email:
        example: john@example.com
        type: string
      firstName:
        example: John
        type: string
      lastName:
        example: Doe
        type: string
    type: object
info:
  contact: {}
paths:
  /customer-debts/{cuit}:
    get:
      description: Retrieves debt information from BCRA Central de Deudores and stores
        successful responses in MongoDB.
      parameters:
      - description: CUIT/CUIL/CDI without hyphens
        example: "20292456078"
        in: path
        name: cuit
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bcra.DebtResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/bcra.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/bcra.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/bcra.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/bcra.ErrorResponse'
      summary: Get customer debt information
      tags:
      - BCRA
  /customers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Customer'
            type: array
      summary: List customers
      tags:
      - Customers
    post:
      consumes:
      - application/json
      parameters:
      - description: Customer
        in: body
        name: customer
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Customer'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create customer
      tags:
      - Customers
  /customers/{id}:
    delete:
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete customer by ID
      tags:
      - Customers
    get:
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Customer'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get customer by ID
      tags:
      - Customers
    put:
      consumes:
      - application/json
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: string
      - description: Customer
        in: body
        name: customer
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Customer'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update customer by ID
      tags:
      - Customers
swagger: "2.0"
