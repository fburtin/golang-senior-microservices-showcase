services:
  mongo:
    image: mongo:7
    container_name: go-showcase-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: go_showcase
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: go-showcase-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo

volumes:
  mongo-data: